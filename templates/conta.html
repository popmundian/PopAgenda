{% extends "base.html" %}
{% block title %}Minha conta{% endblock %}

{% block content %}
<div class="topbar">
  <div>
    <h5 class="mb-0 fw-bold"><i class="bi bi-key me-2 text-primary"></i>Minha conta</h5>
    <small class="text-muted">Trocar sua própria senha</small>
  </div>
  <a href="{{ url_for('index') }}" class="btn btn-outline-secondary btn-sm">
    <i class="bi bi-arrow-left me-1"></i> Voltar
  </a>
</div>

<div class="row justify-content-center">
  <div class="col-12 col-lg-6">
    <div class="card">
      <div class="card-body p-4">
        <form method="POST">
          <div class="mb-3">
            <label class="form-label fw-semibold">Senha atual</label>
            <input type="password" name="current_password" class="form-control" required
                   autocomplete="current-password">
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Nova senha</label>
            <input type="password" name="new_password" class="form-control" minlength="6" required
                   autocomplete="new-password">
            <div class="form-text">Mínimo 6 caracteres.</div>
          </div>
          <button type="submit" class="btn btn-brand">
            <i class="bi bi-check-lg me-1"></i> Alterar senha
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}

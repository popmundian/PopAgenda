<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — Agendador Telegram</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background: #1a2332; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-card { background: #fff; border-radius: 16px; padding: 2.5rem; width: 100%; max-width: 380px; box-shadow: 0 8px 32px rgba(0,0,0,.25); }
    .login-logo { color: #229ED9; font-size: 2.8rem; }
    .login-title { font-weight: 700; color: #1a2332; }
    .login-sub { color: #6b7280; font-size: .88rem; }
    .form-control:focus { border-color: #229ED9; box-shadow: 0 0 0 .2rem rgba(34,158,217,.2); }
    .btn-login { background: #229ED9; color: #fff; border: none; width: 100%; padding: .6rem; font-weight: 600; border-radius: 8px; }
    .btn-login:hover { background: #1a7aab; color: #fff; }
  </style>
</head>
<body>
  <div class="login-card text-center">
    <div class="login-logo mb-2"><i class="bi bi-send-fill"></i></div>
    <div class="login-title mb-1">Agendador Telegram</div>
    <div class="login-sub mb-4">Faça login para gerenciar os agendamentos</div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="alert alert-{{ cat }} py-2 text-start">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST" action="{{ url_for('login') }}">
      <div class="mb-3 text-start">
        <label class="form-label fw-semibold">Usuário</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" name="username" class="form-control" placeholder="admin" required autofocus>
        </div>
      </div>
      <div class="mb-4 text-start">
        <label class="form-label fw-semibold">Senha</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" name="password" class="form-control" placeholder="••••••••" required>
        </div>
      </div>
      <button type="submit" class="btn btn-login">
        <i class="bi bi-box-arrow-in-right me-1"></i> Entrar
      </button>
    </form>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
